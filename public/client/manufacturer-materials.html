<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <title>我的數位版型 (Base Models) - MatchDO 合做</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link href="../img/favicon.ico" rel="icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans&family=Space+Grotesk&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="../css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/config/auth-config.js"></script>
    <script src="/js/auth-middleware.js"></script>
    <style>
        .material-card { border-radius: 12px; border: 1px solid #e9ecef; overflow: hidden; transition: box-shadow .15s; }
        .material-card:hover { box-shadow: 0 4px 18px rgba(0,0,0,.1); }
        .material-img { width: 100%; aspect-ratio: 4/3; object-fit: cover; background: #f0f0f0; display: block; }
        .add-card { border: 2px dashed #cdd4dc; border-radius: 12px; cursor: pointer; min-height: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #8a9ab0; transition: border-color .15s, color .15s, background .15s; }
        .add-card:hover { border-color: #0d6efd; color: #0d6efd; background: #f0f7ff; }
        .section-title { font-size: 1rem; font-weight: 600; color: #444; margin-bottom: 14px; border-left: 3px solid #0d6efd; padding-left: 10px; }
        #toast-area { position: fixed; bottom: 24px; right: 24px; z-index: 9999; }
    </style>
</head>
<body>
    <div id="site-header"></div>

    <div class="container-fluid page-title-bar py-3 bg-light border-bottom">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                <div>
                    <h4 class="mb-0 fw-bold">我的數位版型 (Base Models)</h4>
                    <small class="text-muted">歡迎上傳您的基礎產品版型，方便設計者再設計並與您聯絡。可上傳造型／結構／材質圖，設計端會依分類選用並顯示您的廠商名稱與連結。</small>
                </div>
                <div class="d-flex gap-2">
                    <a href="/client/manufacturer-dashboard.html" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>返回控制台</a>
                    <button class="btn btn-sm btn-primary" id="btn-add-open"><i class="bi bi-plus-lg me-1"></i>新增素材</button>
                </div>
            </div>
        </div>
    </div>

    <div class="container py-4">
        <div id="auth-alert" class="alert alert-warning d-none">請先 <a href="/index.html" class="alert-link">登入</a>。</div>
        <div id="no-mfr-alert" class="alert alert-warning d-none">
            <i class="bi bi-exclamation-triangle me-2"></i>您尚未建立廠商資料。<a href="/client/manufacturer-dashboard.html" class="alert-link">前往控制台建立</a>
        </div>

        <div id="main-content" class="d-none">
            <!-- 新增素材表單 -->
            <div id="add-form-panel" class="card border-0 shadow-sm mb-4 d-none">
                <div class="card-header bg-white d-flex justify-content-between align-items-center">
                    <span class="fw-semibold"><i class="bi bi-plus-circle me-2 text-primary"></i>新增素材</span>
                    <button class="btn-close" id="btn-add-close"></button>
                </div>
                <div class="card-body">
                    <form id="add-form" enctype="multipart/form-data">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">主分類 <span class="text-danger">*</span></label>
                                <select class="form-select" id="add-category" required>
                                    <option value="">— 選擇主分類 —</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">子分類（選填）</label>
                                <select class="form-select" id="add-subcategory">
                                    <option value="">— 選擇子分類 —</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold">素材標題</label>
                                <input type="text" class="form-control" id="add-title" placeholder="例：iPhone 17 Pro Max 背蓋造型">
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold">簡短說明（選填）</label>
                                <textarea class="form-control" id="add-description" rows="2" placeholder="供設計者參考"></textarea>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">用途</label>
                                <select class="form-select" id="add-usage-type">
                                    <option value="reference_only">僅參考</option>
                                    <option value="quotable">可依此報價</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold">素材圖片 <span class="text-danger">*</span></label>
                                <input type="file" class="form-control" id="add-image" accept="image/*" required>
                                <p class="text-muted small mt-1 mb-0">設計者會在產品設計的「參考圖」中依分類看到此圖，並可連到您的廠商頁面。</p>
                            </div>
                            <div class="col-12">
                                <button type="submit" class="btn btn-primary" id="btn-add-submit"><i class="bi bi-cloud-upload me-1"></i>上傳</button>
                                <span id="add-form-msg" class="ms-2 small text-danger"></span>
                            </div>
                        </div>
                    </form>
                </div>
            </div>

            <!-- 分類篩選 -->
            <div class="mb-3">
                <label class="form-label small text-muted">依分類篩選</label>
                <select class="form-select form-select-sm" id="filter-category" style="max-width: 240px;">
                    <option value="">全部</option>
                </select>
            </div>

            <!-- 素材列表 -->
            <div id="materials-grid" class="row g-3"></div>
        </div>
    </div>

    <!-- 編輯 Modal -->
    <div class="modal fade" id="edit-modal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h6 class="modal-title">編輯素材</h6>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="edit-form">
                        <input type="hidden" id="edit-id">
                        <div class="mb-3">
                            <label class="form-label">主分類 <span class="text-danger">*</span></label>
                            <select class="form-select" id="edit-category" required></select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">子分類</label>
                            <select class="form-select" id="edit-subcategory"></select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">素材標題</label>
                            <input type="text" class="form-control" id="edit-title">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">簡短說明</label>
                            <textarea class="form-control" id="edit-description" rows="2"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">用途</label>
                            <select class="form-select" id="edit-usage-type">
                                <option value="reference_only">僅參考</option>
                                <option value="quotable">可依此報價</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">更換圖片（選填）</label>
                            <input type="file" class="form-control" id="edit-image" accept="image/*">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" id="btn-edit-save">儲存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 刪除確認 Modal -->
    <div class="modal fade" id="delete-modal" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-header border-0">
                    <h6 class="modal-title text-danger"><i class="bi bi-trash me-2"></i>刪除素材</h6>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body pt-0" id="delete-confirm-text"></div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-danger btn-sm" id="btn-delete-confirm">刪除</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-area"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/site-header.js"></script>
    <script>
    (function () {
        var token = null;
        var categories = [];
        var materials = [];
        var deleteTargetId = null;
        var editModalEl = null;
        var deleteModalEl = null;

        function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
        function showToast(msg, type) {
            type = type || 'success';
            var area = document.getElementById('toast-area');
            var id = 't' + Date.now();
            area.insertAdjacentHTML('beforeend', '<div id="' + id + '" class="toast align-items-center text-white bg-' + type + ' border-0 show mb-2" role="alert"><div class="d-flex"><div class="toast-body">' + esc(msg) + '</div><button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div></div>');
            setTimeout(function () { var el = document.getElementById(id); if (el) el.remove(); }, 3500);
        }

        async function getToken() {
            if (typeof AuthService === 'undefined') return null;
            try {
                var s = await AuthService.getSession();
                return (s && (s.access_token || (s.session && s.session.access_token))) || null;
            } catch (e) { return null; }
        }

        function fillCategorySelect(selectId, selectedKey) {
            var sel = document.getElementById(selectId);
            if (!sel) return;
            sel.innerHTML = '<option value="">— 選擇主分類 —</option>';
            categories.forEach(function (c) {
                var opt = document.createElement('option');
                opt.value = c.key;
                opt.textContent = c.name || c.key;
                if (c.key === selectedKey) opt.selected = true;
                sel.appendChild(opt);
            });
        }
        function fillSubcategorySelect(selectId, categoryKey, selectedSubKey) {
            var sel = document.getElementById(selectId);
            if (!sel) return;
            sel.innerHTML = '<option value="">— 選擇子分類 —</option>';
            if (!categoryKey) return;
            var cat = categories.find(function (c) { return c.key === categoryKey; });
            var subs = (cat && cat.subcategories) ? cat.subcategories : [];
            subs.forEach(function (s) {
                var opt = document.createElement('option');
                opt.value = s.key;
                opt.textContent = s.name || s.key;
                if (s.key === selectedSubKey) opt.selected = true;
                sel.appendChild(opt);
            });
        }

        async function loadCategories() {
            try {
                var r = await fetch('/api/custom-product-categories');
                var d = await r.json();
                categories = d.categories || [];
                fillCategorySelect('add-category');
                fillCategorySelect('edit-category');
                fillCategorySelect('filter-category');
                var filterSel = document.getElementById('filter-category');
                if (filterSel) filterSel.innerHTML = '<option value="">全部</option>' + categories.map(function (c) { return '<option value="' + esc(c.key) + '">' + esc(c.name || c.key) + '</option>'; }).join('');
            } catch (e) { console.warn('loadCategories', e); }
        }

        async function loadMaterials() {
            var grid = document.getElementById('materials-grid');
            grid.innerHTML = '<div class="col-12 text-center py-4 text-muted"><div class="spinner-border spinner-border-sm me-2"></div>載入中…</div>';
            try {
                var url = '/api/me/vendor-assets';
                var filterCat = document.getElementById('filter-category') && document.getElementById('filter-category').value;
                if (filterCat) url += '?category_key=' + encodeURIComponent(filterCat);
                var r = await fetch(url, { headers: { Authorization: 'Bearer ' + token } });
                var d = await r.json();
                materials = d.items || [];
                renderGrid();
            } catch (e) {
                grid.innerHTML = '<div class="col-12"><div class="alert alert-danger">載入失敗：' + esc(e.message) + '</div></div>';
            }
        }

        function renderGrid() {
            var grid = document.getElementById('materials-grid');
            var filterCat = document.getElementById('filter-category') && document.getElementById('filter-category').value;
            var list = filterCat ? materials : materials;
            if (!list.length) {
                grid.innerHTML = '<div class="col-12"><p class="text-muted mb-0">尚無素材，點上方「新增素材」上傳。</p></div>';
                return;
            }
            var catNames = {};
            categories.forEach(function (c) { catNames[c.key] = c.name || c.key; });
            grid.innerHTML = list.map(function (m) {
                var catName = catNames[m.category_key] || m.category_key || '—';
                var usageLabel = m.usage_type === 'quotable' ? '可依此報價' : '僅參考';
                return '<div class="col-sm-6 col-md-4 col-lg-3"><div class="card material-card h-100">' +
                    (m.image_url ? '<img src="' + esc(m.image_url) + '" class="material-img" loading="lazy" alt="">' : '') +
                    '<div class="card-body p-3">' +
                    '<div class="fw-semibold text-truncate mb-1">' + esc(m.title || '（無標題）') + '</div>' +
                    '<div class="text-muted small mb-2">' + esc(catName) + ' · ' + usageLabel + '</div>' +
                    '<div class="d-flex gap-2">' +
                    '<button class="btn btn-outline-primary btn-sm flex-fill" type="button" data-id="' + esc(m.id) + '"><i class="bi bi-pencil me-1"></i>編輯</button>' +
                    '<button class="btn btn-outline-danger btn-sm" type="button" data-id="' + esc(m.id) + '" data-title="' + esc(m.title || '') + '"><i class="bi bi-trash"></i></button>' +
                    '</div></div></div></div>';
            }).join('');
            grid.querySelectorAll('button[data-id]').forEach(function (btn) {
                if (btn.classList.contains('btn-outline-danger')) {
                    btn.addEventListener('click', function () { openDeleteModal(btn.dataset.id, btn.dataset.title || ''); });
                } else {
                    btn.addEventListener('click', function () { openEditModal(btn.dataset.id); });
                }
            });
        }

        function openAddForm() {
            document.getElementById('add-form-panel').classList.remove('d-none');
            fillCategorySelect('add-category');
            fillSubcategorySelect('add-subcategory', null);
            document.getElementById('add-form').reset();
            document.getElementById('add-form-msg').textContent = '';
        }

        document.getElementById('btn-add-open').addEventListener('click', openAddForm);
        document.getElementById('btn-add-close').addEventListener('click', function () { document.getElementById('add-form-panel').classList.add('d-none'); });

        document.getElementById('add-category').addEventListener('change', function () {
            fillSubcategorySelect('add-subcategory', this.value);
        });

        document.getElementById('add-form').addEventListener('submit', async function (e) {
            e.preventDefault();
            var msgEl = document.getElementById('add-form-msg');
            var categoryKey = document.getElementById('add-category').value;
            if (!categoryKey) { msgEl.textContent = '請選擇主分類'; return; }
            var file = document.getElementById('add-image').files[0];
            if (!file) { msgEl.textContent = '請選擇圖片'; return; }
            msgEl.textContent = '';
            var formData = new FormData();
            formData.append('category_key', categoryKey);
            formData.append('subcategory_key', document.getElementById('add-subcategory').value || '');
            formData.append('title', document.getElementById('add-title').value || '');
            formData.append('description', document.getElementById('add-description').value || '');
            formData.append('usage_type', document.getElementById('add-usage-type').value || 'reference_only');
            formData.append('image', file);
            var btn = document.getElementById('btn-add-submit');
            btn.disabled = true;
            try {
                var r = await fetch('/api/me/vendor-assets', {
                    method: 'POST',
                    headers: { Authorization: 'Bearer ' + token },
                    body: formData
                });
                var data = await r.json().catch(function () { return {}; });
                if (!r.ok) { msgEl.textContent = data.error || '上傳失敗'; return; }
                showToast('已新增素材');
                document.getElementById('add-form-panel').classList.add('d-none');
                loadMaterials();
            } catch (err) {
                msgEl.textContent = err.message || '上傳失敗';
            } finally {
                btn.disabled = false;
            }
        });

        function openEditModal(id) {
            var m = materials.find(function (x) { return x.id === id; });
            if (!m) return;
            document.getElementById('edit-id').value = m.id;
            document.getElementById('edit-title').value = m.title || '';
            document.getElementById('edit-description').value = m.description || '';
            document.getElementById('edit-usage-type').value = m.usage_type || 'reference_only';
            document.getElementById('edit-image').value = '';
            fillCategorySelect('edit-category', m.category_key);
            fillSubcategorySelect('edit-subcategory', m.category_key, m.subcategory_key);
            editModalEl = new bootstrap.Modal(document.getElementById('edit-modal'));
            editModalEl.show();
        }

        document.getElementById('btn-edit-save').addEventListener('click', async function () {
            var id = document.getElementById('edit-id').value;
            var categoryKey = document.getElementById('edit-category').value;
            if (!categoryKey) { showToast('請選擇主分類', 'warning'); return; }
            var formData = new FormData();
            formData.append('category_key', categoryKey);
            formData.append('subcategory_key', document.getElementById('edit-subcategory').value || '');
            formData.append('title', document.getElementById('edit-title').value || '');
            formData.append('description', document.getElementById('edit-description').value || '');
            formData.append('usage_type', document.getElementById('edit-usage-type').value || 'reference_only');
            var file = document.getElementById('edit-image').files[0];
            if (file) formData.append('image', file);
            try {
                var r = await fetch('/api/me/vendor-assets/' + encodeURIComponent(id), {
                    method: 'PUT',
                    headers: { Authorization: 'Bearer ' + token },
                    body: formData
                });
                var data = await r.json().catch(function () { return {}; });
                if (!r.ok) { showToast(data.error || '更新失敗', 'danger'); return; }
                showToast('已更新');
                if (editModalEl) editModalEl.hide();
                loadMaterials();
            } catch (err) {
                showToast(err.message || '更新失敗', 'danger');
            }
        });

        function openDeleteModal(id, title) {
            deleteTargetId = id;
            document.getElementById('delete-confirm-text').textContent = '確定要刪除「' + (title || '此素材') + '」？';
            deleteModalEl = new bootstrap.Modal(document.getElementById('delete-modal'));
            deleteModalEl.show();
        }

        document.getElementById('btn-delete-confirm').addEventListener('click', async function () {
            if (!deleteTargetId) return;
            try {
                var r = await fetch('/api/me/vendor-assets/' + encodeURIComponent(deleteTargetId), {
                    method: 'DELETE',
                    headers: { Authorization: 'Bearer ' + token }
                });
                if (!r.ok) {
                    var d = await r.json().catch(function () { return {}; });
                    showToast(d.error || '刪除失敗', 'danger');
                    return;
                }
                showToast('已刪除');
                if (deleteModalEl) deleteModalEl.hide();
                deleteTargetId = null;
                loadMaterials();
            } catch (err) {
                showToast(err.message || '刪除失敗', 'danger');
            }
        });

        document.getElementById('edit-category').addEventListener('change', function () {
            fillSubcategorySelect('edit-subcategory', this.value);
        });
        document.getElementById('filter-category').addEventListener('change', loadMaterials);

        async function init() {
            token = await getToken();
            if (!token) {
                document.getElementById('auth-alert').classList.remove('d-none');
                return;
            }
            try {
                var mfrRes = await fetch('/api/me/manufacturer', { headers: { Authorization: 'Bearer ' + token } });
                if (mfrRes.status === 404) {
                    document.getElementById('no-mfr-alert').classList.remove('d-none');
                    return;
                }
                if (!mfrRes.ok) throw new Error('載入廠商失敗');
                document.getElementById('main-content').classList.remove('d-none');
                await loadCategories();
                await loadMaterials();
            } catch (e) {
                showToast(e.message, 'danger');
            }
        }
        init();
    })();
    </script>
</body>
</html>

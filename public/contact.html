<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="contact.title">聯絡我們 - MATCHDO 合做</title>
  <link href="/img/favicon.ico" rel="icon">
  <link href="/css/bootstrap.min.css" rel="stylesheet" />
  <link href="/css/style.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet" />
</head>
<body>
  <div id="site-header"></div>

  <div class="container-fluid page-title-bar py-3 border-bottom">
    <div class="container">
      <h1 class="h4 mb-1" data-i18n="contact.title">聯絡我們</h1>
      <p class="text-muted small mb-0" data-i18n="contact.subtitle">若有任何問題或合作需求，歡迎來信。</p>
    </div>
  </div>

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-6">
        <p class="mb-2"><strong data-i18n="contact.emailLabel">客服信箱</strong></p>
        <p class="mb-4"><a href="mailto:support@matchdo.cc">support@matchdo.cc</a></p>
        <p class="mb-2"><strong data-i18n="contact.locationLabel">據點</strong></p>
        <p class="text-muted mb-0" data-i18n="contact.location">台北，台灣</p>
      </div>
    </div>
  </div>

  <div id="site-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/config/auth-config.js"></script>
  <script src="/js/i18n.js"></script>
  <script src="/js/site-header.js"></script>
  <script src="/js/site-footer.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var apply = function() {
        if (window.i18n && typeof window.i18n.applyPage === 'function') window.i18n.applyPage();
        var lang = (window.i18n && window.i18n.getLang) ? window.i18n.getLang() : '';
        document.documentElement.lang = (lang && lang.indexOf('en') === 0) ? 'en' : 'zh-TW';
      };
      if (window.i18n && window.i18n.ready) {
        window.i18n.ready.then(apply);
      } else {
        apply();
      }
      if (window.i18n && window.i18n.on) {
        try { window.i18n.on('languageChanged', apply); } catch(e) {}
      }
    });
  </script>
</body>
</html>
